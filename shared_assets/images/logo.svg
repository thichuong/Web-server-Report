<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="hexGradient" x1="256" y1="20" x2="256" y2="492" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="120" y1="400" x2="420" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#007BFF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Outer Hexagon -->
  <path d="M256 30L465.5 150V362L256 482L46.5 362V150L256 30Z" fill="url(#hexGradient)" stroke="#D4AF37" stroke-width="8"/>
  
  <!-- Inner Hexagon -->
  <path d="M256 97.8L402.65 181.8V330.2L256 414.2L109.35 330.2V181.8L256 97.8Z" stroke="#00D4FF" stroke-width="2" stroke-dasharray="8 4" opacity="0.5"/>

  <!-- Decorative Vertex Nodes -->
  <g fill="#00D4FF">
    <circle cx="256" cy="97.8" r="4"/>
    <circle cx="402.65" cy="181.8" r="4"/>
    <circle cx="402.65" cy="330.2" r="4"/>
    <circle cx="256" cy="414.2" r="4"/>
    <circle cx="109.35" cy="330.2" r="4"/>
    <circle cx="109.35" cy="181.8" r="4"/>
  </g>

  <!-- Technical Accents in Corners -->
  <path d="M60 160L80 140M452 160L432 140M60 352L80 372M452 352L432 372" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>

  <!-- Dynamic Trend Line -->
  <path d="M140 380L230 280L290 320L410 160" stroke="url(#accentGradient)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Arrow Head -->
  <path d="M410 160H350M410 160V220" stroke="#00D4FF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Pulse Effect at Arrow -->
  <circle cx="410" cy="160" r="12" fill="#00D4FF" opacity="0.4">
    <animate attributeName="r" values="12;24;12" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Project Title -->
  <text x="50%" y="270" text-anchor="middle" fill="white" font-family="'Inter', sans-serif" font-weight="900" font-size="28" letter-spacing="3" style="text-shadow: 0px 0px 10px rgba(0,212,255,0.5);">CRYPTO DASHBOARD</text>
</svg>
